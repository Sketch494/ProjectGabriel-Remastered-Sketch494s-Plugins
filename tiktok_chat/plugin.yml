name: tiktok_chat
version: 1.0.0
api_version: 1
author: Sketch494
description: >-
  Lets the AI watch a TikTok Live stream's chat. Connects to a username via
  the TikTokLive library, buffers messages, gifts, and follows, and either
  serves them on demand (`getRecentTikTokChat`) or silently injects batched
  context into the Gemini Live session so the AI can react to viewers in
  real time.
# Off by default. Flip this to true after you `pip install TikTokLive`.
enabled: false
requirements:
  - TikTokLive
